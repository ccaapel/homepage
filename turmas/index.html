<style>
:root {
  --ccaa-blue: oklch(64.7% 0.160 258.3);
  --ccaa-red:  oklch(60.3% 0.206 22.3);
  --live:      oklch(62.7% 0.170 149.2);
  --soon:      oklch(66.6% 0.157 58.3);
  --r-sm:10px; --r-md:13px; --r-lg:18px; --r-xl:22px;
}
[data-theme="dark"] {
  --bg:      oklch(16.5% 0.028 264.5);
  --bg-grad: linear-gradient(180deg, oklch(64.7% 0.160 258.3 / 0.09), transparent 500px);
  --surface: oklch(21.5% 0.030 264.5);
  --surface-2: oklch(24.8% 0.032 264.5);
  --border:  rgba(255,255,255,0.08);
  --text:    oklch(95.8% 0.013 266.7);
  --text-mute: oklch(76.4% 0.039 268.8);
  --text-dim:  oklch(59.1% 0.046 268.7);
  --shadow-card: 0 1px 3px rgba(0,0,0,.4);
  --shadow-hover: 0 12px 34px rgba(0,0,0,.5), 0 3px 10px rgba(0,0,0,.35);
}
[data-theme="light"] {
  --bg:      oklch(97.6% 0.006 264.5);
  --bg-grad: linear-gradient(180deg, oklch(48.7% 0.160 259.2 / 0.05), transparent 500px);
  --surface: #FFFFFF;
  --surface-2: #F6F8FC;
  --border:  #E4E9F1;
  --text:    oklch(20.5% 0.030 264.5);
  --text-mute: #4E576E;
  --text-dim:  #828BA1;
  --shadow-card: 0 1px 3px rgba(15,45,95,.06), 0 1px 2px rgba(15,45,95,.04);
  --shadow-hover: 0 10px 30px rgba(15,45,95,.13), 0 3px 8px rgba(15,45,95,.07);
}
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg); background-image:var(--bg-grad); background-attachment:fixed;
  color:var(--text); min-height:100dvh;
}
a{ color:inherit; text-decoration:none; }

/* ===== HEADER ===== */
.header{
  position:sticky; top:0; z-index:100;
  background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid var(--border);
  padding:0 20px;
}
.header-inner{
  max-width:1100px; margin:0 auto;
  display:flex; align-items:center; gap:12px; height:58px;
}
.header-logo{ width:34px; height:34px; border-radius:8px; object-fit:contain; }
.header-title{ font-size:15px; font-weight:700; }
.header-sub{ font-size:12px; color:var(--text-dim); }
.header-right{ margin-left:auto; display:flex; gap:8px; align-items:center; }
.btn-theme{
  background:none; border:1.5px solid var(--border); border-radius:var(--r-sm);
  color:var(--text-mute); cursor:pointer; padding:6px 8px; font-size:14px;
  transition:border-color .15s, color .15s;
}
.btn-theme:hover{ border-color:var(--ccaa-blue); color:var(--ccaa-blue); }

/* ===== HERO ===== */
.hero{
  text-align:center; padding:48px 20px 32px;
  max-width:600px; margin:0 auto;
}
.hero-logo{ width:60px; height:60px; border-radius:14px; object-fit:contain; margin:0 auto 16px; display:block; }
.hero h1{ font-size:clamp(22px,5vw,32px); font-weight:800; letter-spacing:-.02em; margin-bottom:6px; }
.hero p{ font-size:14px; color:var(--text-dim); }

/* ===== FILTROS ===== */
.filtros{
  max-width:1100px; margin:0 auto;
  padding:0 20px 20px;
  display:flex; flex-wrap:wrap; gap:8px; align-items:center;
}
.busca{
  flex:1; min-width:220px;
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:var(--r-lg); padding:10px 16px; font-size:14px;
  color:var(--text); outline:none; transition:border-color .15s;
}
.busca:focus{ border-color:var(--ccaa-blue); }
.busca::placeholder{ color:var(--text-dim); }
.pill{
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:999px; padding:7px 16px;
  font-size:13px; font-weight:600; color:var(--text-mute);
  cursor:pointer; transition:all .15s; white-space:nowrap;
  -webkit-user-select:none; user-select:none;
}
.pill:hover{ border-color:var(--ccaa-blue); color:var(--ccaa-blue); }
.pill.ativo{ background:var(--ccaa-blue); border-color:var(--ccaa-blue); color:#fff; }
.pill-live{
  background:color-mix(in srgb,var(--live) 16%,transparent);
  border-color:color-mix(in srgb,var(--live) 35%,transparent);
  color:var(--live);
}
.pill-live.ativo{ background:var(--live); border-color:var(--live); color:#fff; }
.pill-soon{
  background:color-mix(in srgb,var(--soon) 14%,transparent);
  border-color:color-mix(in srgb,var(--soon) 30%,transparent);
  color:var(--soon);
}
.pill-soon.ativo{ background:var(--soon); border-color:var(--soon); color:#fff; }

/* ===== STATUS BADGES ===== */
.badge-live{
  display:inline-flex; align-items:center; gap:5px;
  background:color-mix(in srgb,var(--live) 16%,transparent);
  color:var(--live); border-radius:999px; padding:3px 10px; font-size:11.5px; font-weight:700;
}
.badge-live::before{ content:''; display:block; width:7px; height:7px; border-radius:50%; background:var(--live); animation:pulso 1.4s infinite; }
@keyframes pulso{ 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:.4; transform:scale(.7); } }
.badge-soon{
  display:inline-flex; align-items:center; gap:5px;
  background:color-mix(in srgb,var(--soon) 14%,transparent);
  color:var(--soon); border-radius:999px; padding:3px 10px; font-size:11.5px; font-weight:700;
}

/* ===== GRUPOS E CARDS ===== */
.content{ max-width:1100px; margin:0 auto; padding:0 20px 60px; }
.grupo{ margin-bottom:36px; }
.grupo-titulo{
  font-size:14px; font-weight:700; color:var(--text-dim);
  text-transform:uppercase; letter-spacing:.06em;
  margin-bottom:14px; padding-left:2px;
  border-left:3px solid var(--ccaa-blue); padding-left:10px;
}
.cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
.card{
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:var(--r-lg); padding:18px 18px 14px;
  display:flex; flex-direction:column; gap:10px;
  box-shadow:var(--shadow-card);
  transition:transform .18s, box-shadow .18s, border-color .18s;
  cursor:default;
}
.card:hover{ transform:translateY(-2px); box-shadow:var(--shadow-hover); border-color:color-mix(in srgb,var(--ccaa-blue) 30%,var(--border)); }
.card-live{ border-color:color-mix(in srgb,var(--live) 35%,var(--border)); }
.card-live:hover{ border-color:color-mix(in srgb,var(--live) 55%,var(--border)); }
.card-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.card-nome{ font-size:15px; font-weight:700; line-height:1.3; }
.card-nivel{ font-size:11px; font-weight:600; color:var(--text-dim); background:var(--surface-2); border:1px solid var(--border); border-radius:6px; padding:2px 7px; white-space:nowrap; margin-top:2px; }
.card-info{ display:flex; flex-direction:column; gap:5px; }
.card-row{ display:flex; align-items:center; gap:7px; font-size:13px; color:var(--text-mute); }
.card-row svg{ flex-shrink:0; opacity:.6; }
.card-footer{ display:flex; align-items:center; justify-content:space-between; margin-top:2px; padding-top:10px; border-top:1px solid var(--border); }
.btn-zoom{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--ccaa-blue); color:#fff;
  border:none; border-radius:var(--r-sm); padding:7px 14px;
  font-size:13px; font-weight:700; cursor:pointer; text-decoration:none;
  transition:opacity .15s;
}
.btn-zoom:hover{ opacity:.85; }
.btn-zoom-dis{
  background:var(--surface-2); color:var(--text-dim); border:1.5px solid var(--border);
  border-radius:var(--r-sm); padding:6px 13px;
  font-size:13px; cursor:default;
}
.sem-resultado{ text-align:center; padding:60px 20px; color:var(--text-dim); font-size:15px; }

/* ===== RODAPÉ ===== */
.footer{ text-align:center; padding:24px 20px; font-size:12px; color:var(--text-dim); border-top:1px solid var(--border); }
.footer a{ color:var(--ccaa-blue); }
</style>

const JANELA_ANTES = 10; // min antes do início
const JANELA_AGORA = 60; // min de tolerância pós-início

function horaBR(){
  try{
    const s = new Date().toLocaleString('en-US',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit',hour12:false});
    return s.replace(',','').trim();
  }catch(e){ return ''; }
}
function diaBR(){
  try{ return new Date().toLocaleString('en-US',{timeZone:'America/Sao_Paulo',weekday:'short'}).slice(0,3).toLowerCase(); }
  catch(e){ return ''; }
}
function getMinBR(){
  const h = horaBR(); if(!h) return -1;
  const [hh,mm] = h.split(':').map(Number);
  return hh*60+mm;
}
function getDiaBR(){
  try{
    const d = new Date().toLocaleString('en-US',{timeZone:'America/Sao_Paulo',weekday:'short'});
    return {Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6}[d.slice(0,3)] ?? new Date().getDay();
  }catch(e){ return new Date().getDay(); }
}
function toMin(t){ if(!t) return 0; const [h,m]=t.split(':').map(Number); return h*60+m; }
function statusTurma(t){
  const agora = getMinBR(), dia = getDiaBR();
  if(!t.dias.includes(dia)) return 'none';
  const ini = toMin(t.inicio), fim = toMin(t.fim);
  if(agora >= ini - JANELA_ANTES && agora <= fim) return 'live';
  if(agora < ini - JANELA_ANTES && ini - agora <= JANELA_AGORA) return 'soon';
  return 'none';
}

let filtroAtivo = 'Todos';
let filtroStatus = null; // 'live' | 'soon' | null

function render(){
  const busca = document.getElementById('busca').value.toLowerCase().trim();
  const content = document.getElementById('content');
  let html = '';
  let totalVisiveis = 0;

  TURMAS.forEach(grupo => {
    const turmasFiltradas = grupo.turmas.filter(t => {
      if(filtroAtivo !== 'Todos' && filtroAtivo !== grupo.cat) return false;
      const st = statusTurma(t);
      if(filtroStatus === 'live' && st !== 'live') return false;
      if(filtroStatus === 'soon' && st !== 'soon') return false;
      if(busca && !t.nome.toLowerCase().includes(busca) && !t.teacher.toLowerCase().includes(busca)) return false;
      return true;
    });
    if(!turmasFiltradas.length) return;
    totalVisiveis += turmasFiltradas.length;

    html += `<div class="grupo"><div class="grupo-titulo">${grupo.grupo}</div><div class="cards">`;
    turmasFiltradas.forEach(t => {
      const st = statusTurma(t);
      html += `<div class="card${st==='live'?' card-live':''}">
        <div class="card-top">
          <div>
            <div class="card-nome">${t.nome}</div>
            ${t.nivel ? `<div class="card-nivel">${t.nivel}</div>` : ''}
          </div>
          ${st==='live' ? '<span class="badge-live">Ao vivo</span>' : st==='soon' ? '<span class="badge-soon">Em breve</span>' : ''}
        </div>
        <div class="card-info">
          <div class="card-row">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${t.horario}
          </div>
          <div class="card-row">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            ${t.teacher}
          </div>
          ${t.sala ? `<div class="card-row"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>${t.sala}</div>` : ''}
        </div>
        <div class="card-footer">
          ${t.link && !t.link.includes('COLE_')
            ? `<a class="btn-zoom" href="${t.link}" target="_blank" rel="noopener">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.9L15 14M3 8a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8z"/></svg>
                Entrar na aula
              </a>`
            : `<span class="btn-zoom-dis">Link em breve</span>`}
        </div>
      </div>`;
    });
    html += '</div></div>';
  });

  if(!totalVisiveis){
    html = `<div class="sem-resultado">Nenhuma turma encontrada com esse filtro.</div>`;
  }
  content.innerHTML = html;
}

// Filtros
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    const f = p.dataset.filtro;
    if(f === 'live' || f === 'soon'){
      filtroStatus = filtroStatus === f ? null : f;
      filtroAtivo = 'Todos';
      document.querySelectorAll('.pill:not([data-filtro="live"]):not([data-filtro="soon"])').forEach(x => x.classList.remove('ativo'));
    } else {
      filtroAtivo = f;
      filtroStatus = null;
      document.getElementById('pillLive').classList.remove('ativo');
      document.getElementById('pillSoon').classList.remove('ativo');
    }
    document.querySelectorAll('.pill').forEach(x => {
      if(x.dataset.filtro === f && (filtroAtivo===f || filtroStatus===f)) x.classList.add('ativo');
      else if(x.dataset.filtro !== f) x.classList.remove('ativo');
    });
    render();
  });
});
document.getElementById('busca').addEventListener('input', render);

// Tema
document.getElementById('btnTema').addEventListener('click', () => {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('btnTema').textContent = t === 'dark' ? '☀' : '🌙';
  try{ localStorage.setItem('ccaa_tema', t); }catch(e){}
});
try{
  const t = localStorage.getItem('ccaa_tema');
  if(t){ document.documentElement.setAttribute('data-theme', t); document.getElementById('btnTema').textContent = t==='dark'?'☀':'🌙'; }
}catch(e){}

// Atualiza ao vivo a cada 30s
render();
setInterval(render, 30000);

// Ativa pill "Ao vivo" automaticamente se houver aulas agora
window.addEventListener('load', () => {
  const temLive = TURMAS.some(g => g.turmas.some(t => statusTurma(t) === 'live'));
  if(temLive){
    filtroStatus = 'live';
    document.getElementById('pillLive').classList.add('ativo');
    render();
  }
});
